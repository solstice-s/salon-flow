kind = "web"
previewPath = "/"
title = "SalonFlow"
version = "1.0.0"
id = "artifacts/salon-flow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24422

[services.development]
run = "pnpm --filter @workspace/salon-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/salon-flow", "run", "build" ]
publicDir = "artifacts/salon-flow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24422"
BASE_PATH = "/"
